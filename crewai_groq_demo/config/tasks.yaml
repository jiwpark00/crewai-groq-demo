teaching_task:
  description: >
    The user asked: "{user_prompt}"
    Recent web research on this topic:
    ---
    {research_result}
    ---
    Ground your explanation in these findings where relevant.

    Explain the agentic AI concepts most relevant to this specific request.
    Tailor the explanation to whatever audience, domain, or use case the user
    mentioned (e.g. a profession, field, or scenario) instead of giving a
    generic overview. Match the depth, number of points, and framing to what
    was actually asked — if the user requested a specific number of points or
    ideas, use that number. Only mention packages like CrewAI, Google ADK,
    LangGraph, or AutoGen if the request is actually about choosing or
    comparing tools — don't list them by default.

    Get straight to content relevant to their specific request — skip generic
    preambles and don't restate their question back to them before answering.

    Keep the entire response under 300 words unless the user explicitly asks
    for more depth or length.
  expected_output: >
    A focused explanation, under 300 words unless more was requested,
    tailored to the user's specific audience, domain, and requested format
    — not a generic overview.
  agent: teacher

project_task:
  description: >
    The user asked: "{user_prompt}"

    The teaching agent produced this explanation:
    ---
    {teaching_result}
    ---

    Using that explanation, suggest concrete project or use-case ideas that
    match what the user actually asked for — their stated audience, domain,
    and requested count (default to 3 if no count was specified). Ground
    each idea in specifics from the request and explanation above rather
    than reaching for generic/stock ideas (e.g. "a customer support bot")
    unless they are genuinely the best fit.

    For each idea, give: a short name, the goal, a KPI, a recommended
    package (CrewAI, LangGraph, Google ADK, AutoGen, etc.), and one sentence
    on why that package fits. Keep the goal/KPI/rationale fields concise
    (roughly 1-2 sentences each) — do not pad with extra background or
    caveats.
  expected_output: >
    A list of project/use-case ideas tailored to the user's specific
    audience, domain, and requested count, each with a name, goal, KPI,
    and recommended package.
  agent: project_advisor

research_task:
  description: >
    The user asked: "{user_prompt}"

    Search the web for the most current information relevant to this
    request (recent tools, frameworks, news, or examples). Use at most
    2 searches. Summarize the 3-5 most useful findings as short bullet
    points, each with its source URL. If the search returns nothing
    useful, say so plainly.
  expected_output: >
    3-5 bullet points of current findings with source URLs.
  agent: researcher
