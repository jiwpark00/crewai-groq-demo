teaching_task:
  description: >
    The user asked: "{user_prompt}"
    Recent web research on this topic:
    ---
    {research_result}
    ---
    Ground your explanation in these findings where relevant.

    Explain the agentic AI concepts most relevant to this specific request.
    Tailor the explanation to whatever audience, domain, or use case the user
    mentioned (e.g. a profession, field, or scenario) instead of giving a
    generic overview. Match the depth, number of points, and framing to what
    was actually asked — if the user requested a specific number of points or
    ideas, use that number. Only mention packages like CrewAI, Google ADK,
    LangGraph, or AutoGen if the request is actually about choosing or
    comparing tools — don't list them by default.

    Get straight to content relevant to their specific request — skip generic
    preambles and don't restate their question back to them before answering.

    Keep the entire response under 300 words unless the user explicitly asks
    for more depth or length.
  expected_output: >
    A focused explanation, under 300 words unless more was requested,
    tailored to the user's specific audience, domain, and requested format
    — not a generic overview.
  agent: teacher

project_task:
  description: >
    The user asked: "{user_prompt}"

    The teaching agent produced this explanation:
    ---
    {teaching_result}
    ---

    Recent web research on this topic:
    ---
    {research_result}
    ---

    A builder agent's differentiation assessment (if one was run):
    ---
    {builder_result}
    ---

    Using the explanation above, suggest concrete project or use-case ideas that
    match what the user actually asked for — their stated audience, domain,
    and requested count (default to 3 if no count was specified). Ground
    each idea in specifics from the request and explanation above rather
    than reaching for generic/stock ideas (e.g. "a customer support bot")
    unless they are genuinely the best fit.

    For each idea, give: a short name, the goal, a KPI, a recommended
    package (CrewAI, LangGraph, Google ADK, AutoGen, etc.), and one sentence
    on why that package fits. Keep the goal/KPI/rationale fields concise
    (roughly 1-2 sentences each) — do not pad with extra background or
    caveats.

    For each idea, also provide:
    - niche_rationale: why this specific idea/niche fits the request,
      referencing the explanation and research above — not generic reasoning.
    - evidence: a list of specific findings from the research above that
      back this idea, each as a short string that includes its source URL.
      If the research above literally says "(no research was run)", this
      must be an empty list — never invent or paraphrase findings that
      weren't actually looked up.
    - confidence: "high" only if backed by multiple concrete findings above,
      "medium" if backed by general knowledge plus at least one finding,
      "low" if speculative or if no research was run.
    - open_questions: concrete questions someone would need to answer before
      committing to build this, given what's still unknown.

    If the builder's assessment above is not "(no builder assessment was
    run)", use it: prefer package recommendations it made, avoid proposing
    an idea it flagged "low" differentiation for unless you can meaningfully
    differentiate it further, and let its listed risks inform your open
    questions rather than duplicating generic risks.

    Respond with ONLY a single valid JSON object — no markdown code fences,
    no commentary before or after — matching exactly this shape:
    {"ideas": [{"name": "...", "goal": "...", "kpi": "...", "package": "...",
    "rationale": "...", "niche_rationale": "...", "evidence": ["..."],
    "confidence": "low|medium|high", "open_questions": ["..."]}]}
  expected_output: >
    A single JSON object (no markdown fences, no extra text) with an
    "ideas" list tailored to the user's specific audience, domain, and
    requested count, each with a name, goal, KPI, recommended package,
    niche rationale, cited evidence (or an empty list if no research was
    run), a confidence level, and open validation questions.
  agent: project_advisor

research_task:
  description: >
    The user asked: "{user_prompt}"

    Search the web for the most current information relevant to this
    request (recent tools, frameworks, news, or examples). Use at most
    2 searches. Summarize the 3-5 most useful findings as short bullet
    points, each with its source URL. If the search returns nothing
    useful, say so plainly.
  expected_output: >
    3-5 bullet points of current findings with source URLs.
  agent: researcher

market_analysis_task:
  description: >
    The user asked: "{user_prompt}"

    Recent web research on this topic:
    ---
    {research_result}
    ---

    Identify AND SCREEN specific, underserved niches or pain points that
    agentic AI could realistically address, using the research above as raw
    material — not as a list to summarize. A niche must name a specific,
    recurring task or workflow moment, narrow enough to build a single
    focused product around.

    You are the filter, not just a generator: only keep niches you would
    genuinely recommend someone spend time building. Reject anything that's
    still a broad category dressed up as a niche, anything already saturated
    with existing well-known tools (e.g. generic customer-support chatbots,
    generic content generators), or anything the research above doesn't
    actually support. Return up to 3 niches that survive this bar — it is
    correct and expected to return fewer than 3, or zero, if that's all the
    research above genuinely supports. Do not pad the list to hit a count.

    Do NOT restate a finding as a niche. If a finding says "agentic AI can
    automate workflows and scale personalization," do not write a niche
    called "marketers needing to automate workflows and scale
    personalization" — that just repeats the finding's own words back
    (reusing 3+ consecutive words from a finding is a sign you're doing
    this — rewrite it to describe the underlying task instead). Read
    between the findings for the underlying, specific problem they imply.

    Purely to illustrate the LEVEL OF SPECIFICITY required (this example is
    from an unrelated domain — never reuse it or adapt it, your niches must
    come from the actual findings above): bad, too broad, restates a
    finding — "warehouse managers struggling to track inventory." Good,
    specific, names a recurring task — "night-shift warehouse pickers
    manually re-scanning mis-shelved SKUs three times per shift because the
    barcode system doesn't flag aisle mismatches."

    For each niche, name who specifically experiences this pain point, and
    cite the research finding (with its URL) that inspired it — the
    citation should inspire the niche, not be restated as the niche. If the
    research above literally says "(no research was run)", return an empty
    list — never invent or paraphrase findings that weren't actually
    looked up.

    Respond with ONLY a single valid JSON object — no markdown code fences,
    no commentary before or after — matching exactly this shape (use an
    empty "niches" list if nothing clears the bar):
    {"niches": [{"niche": "...", "audience": "...", "evidence": ["..."]}]}
  expected_output: >
    A single JSON object (no markdown fences, no extra text) with a
    "niches" list of 0-3 specific niches that survived screening, each
    naming a recurring task/workflow pain point (not a restated finding or
    broad category), who experiences it, and the research finding (with
    URL) that inspired it. Empty if no research was run, or if nothing
    above genuinely clears the bar.
  agent: market_analyst

builder_task:
  description: >
    The user asked: "{user_prompt}"

    Candidate niches from market analysis:
    ---
    {niches_text}
    ---

    For each niche listed above, assess how differentiated a product built
    for it would be from generic/existing agentic-AI solutions already on
    the market — another generic chatbot, content generator, or "AI
    assistant for X" is NOT differentiated, even if it would be technically
    well-built. Recommend a specific agentic AI package (CrewAI, LangGraph,
    Google ADK, AutoGen, etc.) for each, list what's actually needed to
    build it (tools, data, integrations), and note what could make it
    harder than it looks.

    If the candidate niches above literally say "(no market analysis was
    run)", there is no niche list to work from — instead, assess the
    user's own request as stated, using your general knowledge of what
    similar tools already exist. Produce exactly one assessment in this
    case, covering the user's request as a whole rather than a specific
    niche.

    Respond with ONLY a single valid JSON object — no markdown code fences,
    no commentary before or after — matching exactly this shape:
    {"assessments": [{"niche": "...", "differentiation": "low|medium|high",
    "differentiation_rationale": "...", "recommended_package": "...",
    "key_requirements": ["..."], "risks": ["..."]}]}
  expected_output: >
    A single JSON object (no markdown fences, no extra text) with an
    "assessments" list: one build assessment per candidate niche above (or
    exactly one, covering the user's request as a whole, if no market
    analysis was run), each with a differentiation level and rationale, a
    recommended package, key requirements, and risks.
  agent: builder
